<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{font-family:Arial;background:#f1f3f6;padding:10px;text-align:center}
.box{background:white;padding:15px;border-radius:10px;max-width:430px;margin:auto}
button{width:100%;padding:12px;font-size:17px;margin:7px 0;box-sizing:border-box;background:#4285f4;color:white;border:none;border-radius:6px}
button:disabled{background:#999}
.printBtn{background:#000}

.numberGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0}
.numBtn{font-size:24px;font-weight:bold;padding:15px 0;margin:0;background:#222}
.numBtn.greenBtn{background:#18b85b}
.numBtn.redBtn{background:#ff4b4b}
.numBtn.violetBtn{background:#9b59b6}

.delBtn{background:#ff4b4b;padding:6px;font-size:13px}
.editBtn{background:#28a745;padding:6px;font-size:13px}

.header,.row{display:flex;align-items:center;border:1px solid #ddd;background:white}
.header{background:#4285f4;color:white;font-weight:bold;padding:10px 5px;margin-top:12px}
.row{padding:10px 5px;font-size:20px}
.col{flex:1;text-align:center}
.num{font-size:34px;font-weight:bold}
.type{font-size:22px;color:#222}

.green{color:#18b85b}
.red{color:#ff4b4b}
.violet{color:#9b59b6}

.dot{width:16px;height:16px;border-radius:50%;display:inline-block}
.dot.green{background:#18b85b}
.dot.red{background:#ff4b4b}
.dot.violet{background:#9b59b6}
.doubleDot{display:flex;gap:5px;justify-content:center}

.printColor{font-weight:bold;font-size:20px}
.printColor.red{color:#ff4b4b}
.printColor.green{color:#18b85b}
.printColor.double{color:#9b59b6}

.rowBtns{display:flex;gap:5px;justify-content:center}

.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center
}
.popupBox{background:white;padding:15px;border-radius:10px;width:90%;max-width:350px}
.editGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}

.printOnly{display:none}

@media print{
  body{background:white;padding:0}
  .noPrint,.popup,.screenOnly{display:none!important}
  .printOnly{display:block!important}
  .box{max-width:100%;border-radius:0;padding:0}
  .header{background:#ddd!important;color:#000!important}
  .row,.header{page-break-inside:avoid}
  .row .col:last-child,.header .col:last-child{display:none}
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Panel</h2>

<div class="noPrint">
  <div class="numberGrid">
    <button class="numBtn greenBtn" onclick="addData(1,this)">1</button>
    <button class="numBtn redBtn" onclick="addData(2,this)">2</button>
    <button class="numBtn greenBtn" onclick="addData(3,this)">3</button>
    <button class="numBtn redBtn" onclick="addData(4,this)">4</button>
    <button class="numBtn violetBtn" onclick="addData(5,this)">5</button>

    <button class="numBtn redBtn" onclick="addData(6,this)">6</button>
    <button class="numBtn greenBtn" onclick="addData(7,this)">7</button>
    <button class="numBtn redBtn" onclick="addData(8,this)">8</button>
    <button class="numBtn greenBtn" onclick="addData(9,this)">9</button>
    <button class="numBtn redBtn" onclick="addData(0,this)">0</button>
  </div>

  <button class="printBtn" onclick="printData()">Print</button>
</div>

<div class="screenOnly">
  <div class="header">
    <div class="col">Number</div>
    <div class="col">Text</div>
    <div class="col">Colour</div>
    <div class="col">Action</div>
  </div>
  <div id="adminList"></div>
</div>

<div class="printOnly">
  <div class="header">
    <div class="col">Number</div>
    <div class="col">Text</div>
    <div class="col">Colour</div>
    <div class="col">Action</div>
  </div>
  <div id="printList"></div>
</div>

</div>

<div class="popup" id="popup">
  <div class="popupBox">
    <h3>Edit Data</h3>

    <div class="editGrid">
      <button class="numBtn greenBtn" onclick="updateData(1)">1</button>
      <button class="numBtn redBtn" onclick="updateData(2)">2</button>
      <button class="numBtn greenBtn" onclick="updateData(3)">3</button>
      <button class="numBtn redBtn" onclick="updateData(4)">4</button>
      <button class="numBtn violetBtn" onclick="updateData(5)">5</button>

      <button class="numBtn redBtn" onclick="updateData(6)">6</button>
      <button class="numBtn greenBtn" onclick="updateData(7)">7</button>
      <button class="numBtn redBtn" onclick="updateData(8)">8</button>
      <button class="numBtn greenBtn" onclick="updateData(9)">9</button>
      <button class="numBtn redBtn" onclick="updateData(0)">0</button>
    </div>

    <button onclick="closePopup()" style="background:#999">Cancel</button>
  </div>
</div>

<script type="module">
import {
  db,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc,
  query,
  orderBy
} from "./firebase.js";

import "./pwa.js";

const rule = {
  1:{type:"Small", color:"green"},
  2:{type:"Small", color:"red"},
  3:{type:"Small", color:"green"},
  4:{type:"Small", color:"red"},
  5:{type:"Big", color:"double"},
  6:{type:"Big", color:"red"},
  7:{type:"Big", color:"green"},
  8:{type:"Big", color:"red"},
  9:{type:"Big", color:"green"},
  0:{type:"Small", color:"red"}
};

let data = [];
let editId = null;

const colRef = collection(db, "numberData");
const q = query(colRef, orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot)=>{
  data = [];
  snapshot.forEach((d)=>{
    data.push({ id:d.id, ...d.data() });
  });
  renderAll();
}, (error)=>{
  alert("Firebase Load Error: " + error.message);
});

function getAuto(num){
  return rule[Number(num)];
}

window.addData = async function(num, btn){
  let auto = getAuto(num);

  try{
    btn.innerText = "...";
    btn.disabled = true;

    await addDoc(colRef, {
      num:Number(num),
      type:auto.type,
      color:auto.color,
      createdAt:Date.now()
    });

    btn.innerText = num;

    setTimeout(()=>{
      btn.disabled = false;
    },500);

  }catch(error){
    alert("Save Error: " + error.message);
    btn.innerText = num;
    btn.disabled = false;
  }
};

function renderAll(){
  renderAdmin();
  renderPrint();
}

function renderAdmin(){
  let list = document.getElementById("adminList");
  list.innerHTML = "";

  data.forEach((item,index)=>{
    list.innerHTML += createRow(item,index,false);
  });
}

function renderPrint(){
  let list = document.getElementById("printList");
  list.innerHTML = "";

  [...data].reverse().forEach((item)=>{
    list.innerHTML += createRow(item,null,true);
  });
}

function createRow(item,index,isPrint){
  return `
  <div class="row">
    <div class="col num ${item.color === 'double' ? 'violet' : item.color}">${item.num}</div>
    <div class="col type">${item.type}</div>
    <div class="col">
      ${
        isPrint
        ? `<span class="printColor ${item.color}">
            ${item.color === "double" ? "Violet" : item.color.toUpperCase()}
          </span>`
        : showColor(item.color)
      }
    </div>
    <div class="col">
      ${isPrint ? "" : `
      <div class="rowBtns">
        <button class="editBtn" onclick="openPopup(${index})">Edit</button>
        <button class="delBtn" onclick="deleteItem('${item.id}')">Del</button>
      </div>`}
    </div>
  </div>
  `;
}

function showColor(color){
  if(color === "double"){
    return `<div class="doubleDot"><span class="dot green"></span><span class="dot violet"></span></div>`;
  }
  return `<span class="dot ${color}"></span>`;
}

window.printData = function(){
  renderPrint();
  window.print();
};

window.openPopup = function(index){
  editId = data[index].id;
  document.getElementById("popup").style.display = "flex";
};

window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
};

window.updateData = async function(num){
  let auto = getAuto(num);

  try{
    await updateDoc(doc(db, "numberData", editId), {
      num:Number(num),
      type:auto.type,
      color:auto.color
    });

    closePopup();
  }catch(error){
    alert("Update Error: " + error.message);
  }
};

window.deleteItem = async function(id){
  try{
    await deleteDoc(doc(db, "numberData", id));
  }catch(error){
    alert("Delete Error: " + error.message);
  }
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Number Search</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
  font-family:Arial;
  background:#f1f3f6;
  padding:10px;
  text-align:center;
  margin:0;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  max-width:420px;
  margin:auto;
}

input,button{
  width:100%;
  padding:12px;
  font-size:18px;
  margin:8px 0;
  box-sizing:border-box;
}

button{
  background:#4285f4;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  margin-top:20px;
}

.title{
  background:#4285f4;
  color:white;
  padding:8px;
  font-size:18px;
  font-weight:bold;
  border-radius:6px 6px 0 0;
  margin-top:15px;
}

.row{
  display:flex;
  align-items:center;
  background:white;
  border:1px solid #ddd;
  padding:12px 5px;
  font-size:22px;
}

.col{
  flex:1;
  text-align:center;
}

.num{
  font-size:38px;
  font-weight:bold;
}

.type{
  font-size:26px;
  color:#222;
}

.green{color:#18b85b;}
.red{color:#ff4b4b;}
.violet{color:#9b59b6;}

.dot{
  width:18px;
  height:18px;
  border-radius:50%;
  display:inline-block;
}

.dot.green{background:#18b85b;}
.dot.red{background:#ff4b4b;}
.dot.violet{background:#9b59b6;}

.doubleDot{
  display:flex;
  gap:6px;
  justify-content:center;
}

.notfound{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
  color:red;
}

.loading{
  margin-top:20px;
  font-size:18px;
  color:#333;
}
</style>
</head>

<body>

<div class="box">

<h2>Colour Trading</h2>

<input type="file" id="fileInput" accept=".json">

<input type="text" id="search" placeholder="2, 3 या 4 अंक डालें" maxlength="4">

<button onclick="findData()">Search</button>

<div class="result" id="output">
  <div class="loading">पहले JSON file choose करें</div>
</div>

</div>

<script>
let data = [];

/* JSON FILE LOAD */
document.getElementById("fileInput").addEventListener("change", function(){

  const file = this.files[0];
  const output = document.getElementById("output");

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    try{

      data = JSON.parse(e.target.result);

      data.sort((a,b)=>{
        return Number(b.createdAt || 0) - Number(a.createdAt || 0);
      });

      output.innerHTML = `
        <div class="loading">
          Data load हो गया, अब search करें
        </div>
      `;

    }catch(err){

      data = [];

      output.innerHTML = `
        <div class="notfound">
          Wrong JSON File
        </div>
      `;

    }

  };

  reader.readAsText(file);

});

function findData(){

  const input = document.getElementById("search").value.trim();
  const output = document.getElementById("output");

  if(data.length === 0){

    output.innerHTML = `
      <div class="notfound">
        पहले JSON file choose करें
      </div>
    `;

    return;
  }

  if(!/^[0-9]{2,4}$/.test(input)){

    output.innerHTML = `
      <div class="notfound">
        कृपया सिर्फ 2 से 4 digit डालो
      </div>
    `;

    return;
  }

  const searchNums = input.split("").map(n => Number(n));
  const len = searchNums.length;

  for(let i = 0; i <= data.length - len; i++){

    let match = true;

    for(let j = 0; j < len; j++){

      if(Number(data[i + j].num) !== searchNums[j]){
        match = false;
        break;
      }

    }

    if(match){

      const aageWala = data[i - 1];
      const pichheWala = data[i + len];

      output.innerHTML = `
        <div class="title">आगे वाला</div>
        ${showItemRow(aageWala)}

        <div class="title">पीछे वाला</div>
        ${showItemRow(pichheWala)}
      `;

      return;
    }

  }

  output.innerHTML = `
    <div class="notfound">
      Not Found
    </div>
  `;

}

function showItemRow(item){

  if(!item){
    return `
      <div class="row">
        <div class="col">नहीं है</div>
      </div>
    `;
  }

  let color = item.color;

  if(color === "violet"){
    color = "double";
  }

  return `
    <div class="row">

      <div class="col num ${color === "double" ? "violet" : color}">
        ${item.num}
      </div>

      <div class="col type">
        ${item.type}
      </div>

      <div class="col">
        ${showColor(color)}
      </div>

    </div>
  `;
}

function showColor(color){

  if(color === "double"){

    return `
      <div class="doubleDot">
        <span class="dot green"></span>
        <span class="dot violet"></span>
      </div>
    `;

  }

  return `<span class="dot ${color}"></span>`;
}

/* PWA SERVICE WORKER */
if("serviceWorker" in navigator){

  window.addEventListener("load", ()=>{

    navigator.serviceWorker
    .register("./service-worker.js")
    .then(()=>{
      console.log("Service Worker Registered");
    })
    .catch(err=>{
      console.log("Service Worker Error", err);
    });

  });

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSON Result Finder</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05070d">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
  margin:0;
  padding:15px;
  font-family:Arial,sans-serif;
  background:#05070d;
  color:#00ff99;
}

.box{
  max-width:520px;
  margin:auto;
  background:#0b1020;
  padding:16px;
  border-radius:14px;
  border:1px solid #00ff99;
}

input,button{
  width:100%;
  padding:13px;
  margin:8px 0;
  font-size:17px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

input{
  background:#000;
  color:#00ff99;
  border:1px solid #00ff99;
}

button{
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:15px;
  background:#000;
  border:1px solid #00ff99;
  padding:15px;
  border-radius:10px;
  line-height:1.7;
  font-size:16px;
  word-break:break-word;
  font-family:"Courier New", monospace;
  min-height:170px;
}

.finalResult{
  text-align:center;
}

.signalResult{
  display:inline-block;
  font-size:34px;
  font-weight:bold;
  color:#00ff99;
  background:#001a0d;
  border:1px solid #00ff99;
  padding:14px 18px;
  border-radius:8px;
  animation: signalGlow 1s infinite;
}

.periodText{
  margin-top:18px;
  font-size:20px;
  color:#ffffff;
}

.previousText{
  margin-top:12px;
  color:#00ff99;
  font-size:18px;
  font-family:"Courier New", monospace;
}

@keyframes signalGlow{
  0%{
    opacity:.35;
    transform:scale(.98);
    box-shadow:0 0 3px #00ff99;
  }
  50%{
    opacity:1;
    transform:scale(1);
    box-shadow:0 0 20px #00ff99,0 0 45px #00ff99;
  }
  100%{
    opacity:.35;
    transform:scale(.98);
    box-shadow:0 0 3px #00ff99;
  }
}
</style>
</head>

<body>

<div class="box">

  <input type="file" id="jsonFile" accept=".json">

  <input type="text" id="searchBox" placeholder="51606 या 112 या 506">

  <button onclick="searchData()">SEARCH RESULT</button>

  <div class="result" id="resultBox">
    UPLOAD JSON FILE...
  </div>

</div>

<script>
let data = [];
let typingTimer = null;

// JSON LOAD
document.getElementById("jsonFile").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    try{
      data = JSON.parse(event.target.result);

      if(!Array.isArray(data)){
        throw new Error("JSON Array नहीं है");
      }

      data = data.filter(function(item){
        return item.issueNumber !== undefined && item.number !== undefined;
      });

      // issue number के हिसाब से auto serial sort
      data.sort(function(a,b){
        return Number(a.issueNumber) - Number(b.issueNumber);
      });

      terminalType([
        "> लोड हो रहा है सर",
        "> TOTAL RECORDS: " + data.length,
        "> SYSTEM READY..."
      ]);

    }catch(err){
      terminalType([
        "> ERROR: INVALID JSON FILE"
      ]);
    }
  };

  reader.readAsText(file);
});

// BIG / SMALL
function getBigSmall(num){
  num = Number(num);
  return num >= 5 ? "BIG" : "SMALL";
}

// COLOR
function getColorByNumber(num){
  num = Number(num);

  if(num === 0) return "RED,VIOLET";
  if(num === 5) return "GREEN,VIOLET";
  if(num % 2 === 0) return "RED";
  return "GREEN";
}

// ISSUE NUMBER
function getIssueNum(item){
  return Number(item.issueNumber);
}

// SERIAL CHECK
function isSerialWise(startIndex, endIndex){
  for(let i = startIndex; i < endIndex; i++){
    if(getIssueNum(data[i + 1]) !== getIssueNum(data[i]) + 1){
      return false;
    }
  }
  return true;
}

// TERMINAL EFFECT
function terminalType(lines){
  const box = document.getElementById("resultBox");

  if(typingTimer){
    clearTimeout(typingTimer);
  }

  box.innerHTML = "";

  let text = lines.join("\n");
  let i = 0;

  function typing(){
    if(i < text.length){
      box.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
      i++;
      typingTimer = setTimeout(typing,15);
    }
  }

  typing();
}

// FINAL RESULT
function showFinalOnly(item, previousItem){
  const number = String(item.number);
  const bigSmall = getBigSmall(number);
  const color = String(item.color || getColorByNumber(number)).toUpperCase();

  let previousHtml = "";

  if(previousItem){
    const prevNumber = String(previousItem.number);
    const prevBigSmall = getBigSmall(prevNumber);
    const prevColor = String(previousItem.color || getColorByNumber(prevNumber)).toUpperCase();

    previousHtml = `
      <div class="previousText">
        ${prevNumber} | ${prevBigSmall} | ${prevColor}
      </div>
    `;
  }

  document.getElementById("resultBox").innerHTML = `
    <div class="finalResult">
      <div class="signalResult">
        ${number} | ${bigSmall} | ${color}
      </div>

      <div class="periodText">
        PERIOD: ${item.issueNumber}
      </div>

      ${previousHtml}
    </div>
  `;
}

// SEARCH EFFECT
function showTerminalThenFinal(item, previousItem){
  terminalType([
    "> CONNECTING DATABASE...",
    "> MATCH FOUND...",
    "> SERIAL CHECK OK...",
    "> GENERATING RESULT..."
  ]);

  setTimeout(function(){
    showFinalOnly(item, previousItem);
  },1600);
}

// SEARCH
function searchData(){
  const q = document.getElementById("searchBox").value.trim();

  if(data.length === 0){
    terminalType(["> ERROR: UPLOAD JSON FILE"]);
    return;
  }

  if(q === ""){
    terminalType(["> ERROR: ENTER VALUE"]);
    return;
  }

  // MODE 1: ISSUE LAST DIGIT SEARCH
  if(q.length >= 4){
    const issueIndex = data.findIndex(function(item){
      return String(item.issueNumber).endsWith(q);
    });

    if(issueIndex !== -1){
      const previousItem =
        issueIndex > 0 &&
        getIssueNum(data[issueIndex]) === getIssueNum(data[issueIndex - 1]) + 1
          ? data[issueIndex - 1]
          : null;

      showTerminalThenFinal(data[issueIndex], previousItem);
      return;
    }
  }

  // MODE 2: PATTERN SEARCH ONLY SERIAL WISE
  for(let i = 0; i <= data.length - q.length - 1; i++){

    let pattern = "";

    for(let j = 0; j < q.length; j++){
      pattern += String(data[i + j].number);
    }

    if(pattern === q){

      const nextIndex = i + q.length;

      // pattern + next result serial wise होना जरूरी
      if(!isSerialWise(i, nextIndex)){
        continue;
      }

      const nextResult = data[nextIndex];

      const previousResult =
        i > 0 &&
        getIssueNum(data[i]) === getIssueNum(data[i - 1]) + 1
          ? data[i - 1]
          : null;

      if(nextResult){
        showTerminalThenFinal(nextResult, previousResult);
      }else{
        terminalType([
          "> PATTERN FOUND",
          "> NEXT RESULT NOT AVAILABLE"
        ]);
      }

      return;
    }
  }

  terminalType([
    "> SEARCHING...",
    "> NO SERIAL WISE RESULT FOUND"
  ]);
}

// PWA SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
